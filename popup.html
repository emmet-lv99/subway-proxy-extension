<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>퇴근길 2호선 설정</title>
    <link rel="stylesheet" href="./css/popup.css" />
  </head>
  <body>
    <h3>알림 모니터링 설정</h3>

    <div class="form-group">
      <label for="station-name">퇴근역 이름</label>
      <input
        type="text"
        id="station-name"
        class="input-text"
        placeholder="예: 강남 (역 자 제외)"
      />
    </div>

    <div class="form-group">
      <label for="target-offset">감시 범위 (정거장 전)</label>
      <select id="target-offset" style="width: 100%">
        <option value="1">1정거장 전 열차 감시</option>
        <option value="2" selected>2정거장 전 열차 감시</option>
        <option value="3">3정거장 전 열차 감시</option>
        <option value="4">4정거장 전 열차 감시</option>
      </select>
    </div>

    <div class="form-group">
      <label>운행 방향</label>
      <div class="radio-group">
        <label>
          <input type="radio" name="updn-line" value="0" checked />
          내선 (상행)
        </label>
        <label>
          <input type="radio" name="updn-line" value="1" />
          외선 (하행)
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>감시 요일</label>
      <div class="days-container">
        <label class="day-checkbox">
          <input type="checkbox" name="day" value="1" checked />
          월
        </label>
        <label class="day-checkbox">
          <input type="checkbox" name="day" value="2" checked />
          화
        </label>
        <label class="day-checkbox">
          <input type="checkbox" name="day" value="3" checked />
          수
        </label>
        <label class="day-checkbox">
          <input type="checkbox" name="day" value="4" checked />
          목
        </label>
        <label class="day-checkbox">
          <input type="checkbox" name="day" value="5" checked />
          금
        </label>
        <label class="day-checkbox">
          <input type="checkbox" name="day" value="6" />
          토
        </label>
        <label class="day-checkbox">
          <input type="checkbox" name="day" value="0" />
          일
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>감시 시간대</label>
      <div class="time-select-container">
        <select id="start-hour">
          <option value="17">17시 (오후 5시)</option>
          <option value="18">18시 (오후 6시)</option>
          <option value="19" selected>19시 (오후 7시)</option>
        </select>
        <span>부터</span>
        <select id="end-hour">
          <option value="20">20시 (오후 8시)</option>
          <option value="21">21시 (오후 9시)</option>
          <option value="22" selected>22시 (오후 10시)</option>
          <option value="23" selected>23시 (오후 11시)</option>
        </select>
        <span>까지</span>
      </div>
    </div>

    <button id="save-btn">설정 저장하기</button>
    <div id="status-msg" class="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
